<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Converter Pro v2</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
    margin: 0;
    padding: 10px;
}

.container {
    background: white;
    padding: 16px;
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    margin: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

h2 {
    text-align: center;
    margin-bottom: 12px;
}

/* Toggle */
.toggle {
    display: flex;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 12px;
}
.toggle button {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-weight: bold;
}
.toggle .active {
    background: #28a745;
    color: white;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

/* Button */
button.convert {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 10px;
    border: none;
    background: #007bff;
    color: white;
    font-size: 16px;
}

/* Cards */
.card {
    margin-top: 12px;
    padding: 12px;
    border-radius: 10px;
    background: #f1f6ff;
}

.small {
    font-size: 13px;
    background: #fff3cd;
}

.smallLabel {
    font-size: 13px;
    color: "grey";
}
</style>
</head>

<body>

<div class="container">
    <h4>Gram to Tola Converter & Final Price Calculator</h4>

    <div class="toggle">
        <button id="btnG" class="active" onclick="setMode('g')">Gram → Tola</button>
        <button id="btnT" onclick="setMode('t')">Tola → Gram</button>
    </div>

    <label class="smallLabel">Weight</label>
    <input type="number" id="inputValue" placeholder="Enter weight in grams (e.g. 25.5)">
    <br>

    <label class="smallLabel">Rate (₹/Gram)</label>
    <input type="number" id="goldRate" value="15550" step="0.01" placeholder="Gold / Silver rate ₹/gram">

    <button class="convert" onclick="convert()">Convert</button>

    <div class="card" id="result"></div>

    <div class="card small" id="priceInfo"></div>

    <div class="card small">
        <strong>Unit Reference:</strong><br><br>
        1 Tola = 11.6638038 gm = 11 gm 670 miligram<br><br>

        1 Anna = 0.7277377 gm = 730 miligram<br><br>

        1 Ratti = 0.1212896 gm = 120 miligram<br>
    </div>
</div>

<script>
let mode = "g";
const GRAMS_PER_TOLA = 11.6638038;

function setMode(m) {
    mode = m;

    document.getElementById("btnG").classList.remove("active");
    document.getElementById("btnT").classList.remove("active");

    if (m === "g") {
        document.getElementById("btnG").classList.add("active");
        document.getElementById("inputValue").placeholder = "Enter weight in grams (e.g. 25.5)";
    } else {
        document.getElementById("btnT").classList.add("active");
        document.getElementById("inputValue").placeholder = "Enter weight in tola (e.g. 2.5)";
    }
}

function updatePriceInfo() {
    let rate = parseFloat(document.getElementById("goldRate").value);
    let per10g = rate * 10;

    document.getElementById("priceInfo").innerHTML = 
        "₹" + rate.toFixed(2) + "/g  |  ₹" + per10g.toFixed(0) + "/10g";
}

function convert() {
    let value = parseFloat(document.getElementById("inputValue").value);
    let rate = parseFloat(document.getElementById("goldRate").value);

    if (!value || value <= 0) {
        document.getElementById("result").innerHTML = "Enter valid value";
        return;
    }

    if (mode === "g") {
        let totalTola = value / GRAMS_PER_TOLA;
        let tola = Math.floor(totalTola);
        let anna = Math.floor((totalTola - tola) * 16);
        let ratti = Math.round((((totalTola - tola) * 16) - anna) * 6);

        let price = value * rate;

        document.getElementById("result").innerHTML =
            "<strong>" + totalTola.toFixed(4) + " Tola</strong><br>" +
            tola + " Tola " + anna + " Anna " + ratti + " Ratti<br><br>" +
            "₹" + price.toFixed(2);
    } else {
        let grams = value * GRAMS_PER_TOLA;
        let price = grams * rate;

        document.getElementById("result").innerHTML =
            "<strong>" + grams.toFixed(4) + " grams</strong><br><br>" +
            "₹" + price.toFixed(2);
    }
}

updatePriceInfo();
document.getElementById("goldRate").addEventListener("input", updatePriceInfo);
</script>

</body>
</html>
